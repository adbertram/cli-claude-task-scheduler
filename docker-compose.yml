version: '3.8'

services:
  scheduler:
    build: .
    container_name: claude-task-scheduler
    restart: unless-stopped
    volumes:
      # Persistent database storage
      - scheduler-data:/data
      # Claude Code configuration and sessions (mount from host)
      - ~/.claude:/home/scheduler/.claude:ro
      # Project directories for task execution (customize paths as needed)
      - ~/Dropbox/GitRepos:/projects:ro
    environment:
      # Anthropic API key for Claude Code
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Optional: Default model
      - CLAUDE_DEFAULT_MODEL=opus
    # For notifications, the container needs access to slack/google CLIs
    # Option 1: Install them in the container (add to Dockerfile)
    # Option 2: Use host network and call host CLIs
    # Option 3: Set up notification webhooks instead
    # network_mode: host  # Uncomment if using host CLIs

volumes:
  scheduler-data:
    driver: local

# To build and run:
#   docker-compose build
#   docker-compose up -d
#
# To view logs:
#   docker-compose logs -f
#
# To stop:
#   docker-compose down
#
# To manage tasks (from host):
#   claude-task-scheduler tasks list
#   claude-task-scheduler tasks create --name "Daily Report" ...
